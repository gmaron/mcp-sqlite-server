services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-mcp_logs}

  mongo-express:
    # UI para ver los logs en el browser
    image: mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: ${MONGO_URI:-mongodb://mongo:27017/}
    depends_on:
      - mongo

  mcp-server:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./users.db:/app/users.db
      - ./etl/chroma_db:/app/etl/chroma_db:ro
    environment:
      - MONGO_URI=${MONGO_URI:-mongodb://mongo:27017/}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - mongo

volumes:
  mongo_data:
